<head>

<title>HSK 1 · ELITE MULTILINGUE (FULL)</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Noto+Serif+SC:wght@900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050505; --surface: #0f0f0f; --panel: #161616;
  --primary: #FF0000; --accent: #D4AF37; --text: #FFFFFF;
  --text-dim: #888888; --border: #222222; --border-bold: #444444;
  --success: #2d7a4f;
}
* { box-sizing: border-box; margin: 0; padding: 0; border-radius: 0 !important; }
body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; display: flex; height: 100vh; overflow: hidden; }

/* ECRAN D'ACCÈS AUDIO */
#unlocker { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 15px solid var(--primary); text-align: center; padding: 20px; }
#unlocker h1 { font-family: 'Noto Serif SC', serif; font-size: clamp(3rem, 10vw, 6rem); color: var(--primary); margin-bottom: 20px; }
#audioStatus { font-family: 'Space Mono'; color: var(--accent); margin-bottom: 20px; font-size: 0.8rem; }
#unlocker button { background: var(--primary); color: white; border: none; padding: 20px 40px; font-family: 'Space Mono'; font-weight: 900; font-size: 1rem; cursor: pointer; letter-spacing: 5px; }

/* NAVIGATION */
nav { width: 260px; background: var(--surface); border-right: 2px solid var(--border-bold); display: flex; flex-direction: column; padding: 20px 0; flex-shrink: 0; z-index: 100; }
.brand { padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
.brand h1 { font-family: 'Noto Serif SC', serif; font-size: 1.8rem; color: var(--primary); }
nav button { background: none; border: none; color: var(--text-dim); text-align: left; padding: 15px 20px; font-size: 0.75rem; font-family: 'Space Mono'; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; border-left: 4px solid transparent; }
nav button:hover, nav button.active { color: var(--text); background: var(--panel); border-left-color: var(--primary); }

/* MAIN CONTENT */
main { flex-grow: 1; overflow-y: auto; padding: 20px; scrollbar-width: thin; scrollbar-color: var(--primary) var(--bg); }
.section { display: none; max-width: 1100px; margin: 0 auto; }
.section.active { display: block; }

/* TOP BAR */
.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
.top-bar h2 { font-family: 'Space Mono'; font-size: 1rem; letter-spacing: 2px; }
.lang-switcher { display: flex; gap: 5px; }
.lang-btn { background: var(--panel); border: 1px solid var(--border-bold); color: var(--text-dim); padding: 5px 10px; font-family: 'Space Mono'; font-size: 0.7rem; cursor: pointer; }
.lang-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

/* GRID & CARDS */
.vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
.vocab-card { background: var(--surface); border: 1px solid var(--border); padding: 20px; transition: 0.2s; cursor: pointer; position: relative; }
.vocab-card:hover { border-color: var(--accent); }
.vocab-char { font-family: 'Noto Serif SC', serif; font-size: 3.5rem; color: var(--accent); line-height: 1; margin-bottom: 5px; }
.vocab-pinyin { color: var(--primary); font-family: 'Space Mono'; font-weight: 700; font-size: 0.8rem; margin-bottom: 3px; }
.vocab-fr { font-size: 1rem; color: var(--text); font-weight: 300; margin-bottom: 10px; }
.vocab-ex { font-size: 0.75rem; color: var(--text-dim); border-top: 1px solid var(--border); padding-top: 8px; line-height: 1.3; }

/* RESUME / CHECKLIST */
.resume-cat { margin-bottom: 30px; }
.resume-cat h3 { font-family: 'Space Mono'; color: var(--accent); font-size: 0.8rem; margin-bottom: 10px; border-left: 3px solid var(--primary); padding-left: 10px; }
.resume-row { display: grid; grid-template-columns: 80px 100px 1fr 40px; background: var(--surface); margin-bottom: 2px; padding: 10px; align-items: center; font-size: 0.8rem; cursor: pointer; }
.resume-row:hover { background: var(--panel); }

/* QUIZ */
.quiz-box { max-width: 500px; margin: 40px auto; background: var(--surface); border: 1px solid var(--primary); padding: 30px; text-align: center; }
.quiz-options { display: grid; gap: 10px; margin-top: 20px; }
.quiz-opt { background: var(--panel); border: 1px solid var(--border-bold); color: white; padding: 15px; cursor: pointer; font-family: 'Space Grotesk'; }
.quiz-opt:hover { border-color: var(--accent); }

/* STATS */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
.stat-box { background: var(--surface); border: 1px solid var(--border-bold); padding: 15px; text-align: center; }
.stat-num { font-size: 1.8rem; font-family: 'Noto Serif SC'; color: var(--primary); }
.stat-label { font-family: 'Space Mono'; font-size: 0.55rem; color: var(--text-dim); text-transform: uppercase; }
.lp-bar { height: 6px; background: var(--border); margin-top: 4px; }
.lp-fill { height: 100%; background: var(--accent); transition: width 0.5s; }

/* MOBILE RESPONSIVE */
@media (max-width: 800px) {
    body { flex-direction: column; }
    nav { width: 100%; height: auto; padding: 5px; flex-direction: row; overflow-x: auto; border-right: none; border-bottom: 2px solid var(--border-bold); }
    .brand { display: none; }
    nav button { padding: 10px 15px; white-space: nowrap; border-left: none; border-bottom: 3px solid transparent; font-size: 0.65rem; }
    nav button.active { border-bottom-color: var(--primary); }
}

.mastered-badge { position: absolute; top: 10px; right: 10px; background: var(--success); font-size: 0.5rem; padding: 2px 5px; font-family: 'Space Mono'; }
</style>

                <div id="quizOptions" class="quiz-options"></div>
            </div>
        </div>
    </div>

    <div class="section" id="stats">

</main>

// --- LOGIQUE ---
let state = {
    mastered: JSON.parse(localStorage.getItem('hsk1_mastered') || '{}'),
    streak: parseInt(localStorage.getItem('hsk1_streak') || '1'),
    lang: localStorage.getItem('hsk1_lang') || 'fr'
};

const categories = ["All", ...new Set(HSK1.map(w => w.cat))];

function save() {
    localStorage.setItem('hsk1_mastered', JSON.stringify(state.mastered));
    localStorage.setItem('hsk1_streak', state.streak.toString());
    localStorage.setItem('hsk1_lang', state.lang);
}

function speak(text) {
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'zh-CN';
    msg.rate = 0.8;
    msg.volume = 1.0; 
    window.speechSynthesis.speak(msg);
}

function showSection(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
    document.getElementById('viewTitle').innerText = btn.innerText.split('.')[1].trim() + " HSK1";
    
    if(id === 'resume') renderResume();
    if(id === 'quiz') renderQuizNav();
    if(id === 'stats') renderStats();
}

function changeLang(l) {
    state.lang = l;
    save();
    updateUI();
}

function updateUI() {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`lang-${state.lang}`).classList.add('active');
    renderFiches();
    renderStats();
}

// 1. RENDU LEXIQUE
function renderFiches() {
    const grid = document.getElementById('vocabGrid');
    const search = document.getElementById('searchInput').value.toLowerCase();
    const cat = document.getElementById('catFilter').value;
    
    const filtered = HSK1.filter(w => {
        const matchesCat = cat === "All" || w.cat === cat;
        const trans = state.lang === 'fr' ? w.fr : w.en;
        return matchesCat && (trans.toLowerCase().includes(search) || w.char.includes(search) || w.pinyin.toLowerCase().includes(search));
    });

    grid.innerHTML = filtered.map(w => `
        <div class="vocab-card" onclick="speak('${w.char}')">
            ${state.mastered[w.char] ? `<div class="mastered-badge">CONNU</div>` : ''}
            <div class="vocab-pinyin">${w.pinyin.toUpperCase()}</div>
            <div class="vocab-char">${w.char}</div>
            <div class="vocab-fr">${state.lang === 'fr' ? w.fr : w.en}</div>
            <div class="vocab-ex">${w.ex}<br><span style="opacity:0.5">${state.lang === 'fr' ? w.exFr : (w.exEn || w.fr)}</span></div>
            <button onclick="toggleMastered(event, '${w.char}')" style="margin-top:15px; width:100%; padding:8px; background:var(--panel); border:1px solid var(--border-bold); color:var(--text-dim); font-size:0.6rem; cursor:pointer;">
                ${state.mastered[w.char] ? 'MARQUER À RÉVISER' : 'MARQUER CONNU'}
            </button>
        </div>
    `).join('');
}

function toggleMastered(e, char) {
    e.stopPropagation();
    state.mastered[char] = !state.mastered[char];
    save();
    renderFiches();
}

// 2. RENDU RÉSUMÉS
function renderResume() {
    const container = document.getElementById('resumeContainer');
    let html = '';
    categories.filter(c => c !== "All").forEach(cat => {
        const words = HSK1.filter(w => w.cat === cat);
        html += `<div class="resume-cat">
            <h3>${cat.toUpperCase()} (${words.length})</h3>
            ${words.map(w => `
                <div class="resume-row" onclick="speak('${w.char}')">
                    <div style="font-family:'Noto Serif SC'; color:var(--accent); font-size:1.2rem;">${w.char}</div>
                    <div style="color:var(--primary); font-family:'Space Mono';">${w.pinyin}</div>
                    <div style="color:var(--text-dim);">${state.lang === 'fr' ? w.fr : w.en}</div>
                    <div style="text-align:right;">${state.mastered[w.char] ? '✅' : '·'}</div>
                </div>
            `).join('')}
        </div>`;
    });
    container.innerHTML = html;
}

// --- ÉTAT DU QUIZ & MÉMOIRE ---
// Initialisation de seenWords s'il n'existe pas
if (!state.seenWords) state.seenWords = JSON.parse(localStorage.getItem('hsk1_seen') || '{}');

let quizState = {
    count: 0,
    score: 0,
    currentCat: "",
};

function saveSeenWords() {
    localStorage.setItem('hsk1_seen', JSON.stringify(state.seenWords));
}

// 3. RENDU DU QUIZ (MODIFIÉ)
function renderQuizNav() {
    const container = document.getElementById('quizCatSelection');
    document.getElementById('quizGame').style.display = 'none';
    document.getElementById('quizInstructions').style.display = 'block';
    
    container.innerHTML = categories.map(cat => {
        const fullPool = cat === "All" ? HSK1 : HSK1.filter(w => w.cat === cat);
        const seenInCat = fullPool.filter(w => state.seenWords[w.char]).length;
        const totalInCat = fullPool.length;
        
        return `
            <button class="quiz-opt" onclick="startQuiz('${cat}')">
                ${cat === 'All' ? 'TOUT MÉLANGER' : cat} <br>
                <span style="font-size:0.6rem; opacity:0.7;">(${seenInCat}/${totalInCat} vus)</span>
            </button>`;
    }).join('');
}

function startQuiz(cat) {
    quizState.count = 0;
    quizState.score = 0;
    quizState.currentCat = cat;
    
    document.getElementById('quizInstructions').style.display = 'none';
    document.getElementById('quizCatSelection').innerHTML = '';
    document.getElementById('quizGame').style.display = 'block';
    
    nextQuestion();
}

function nextQuestion() {
    const cat = quizState.currentCat;
    const fullPool = cat === "All" ? HSK1 : HSK1.filter(w => w.cat === cat);
    
    // 1. Filtrer les mots non vus
    let available = fullPool.filter(w => !state.seenWords[w.char]);
    
    // 2. Si tout est vu, on réinitialise pour cette catégorie
    if (available.length === 0) {
        fullPool.forEach(w => delete state.seenWords[w.char]);
        available = [...fullPool];
        saveSeenWords();
    }

    // 3. Sélection du mot cible
    const target = available[Math.floor(Math.random() * available.length)];
    
    // 4. Marquer comme vu
    state.seenWords[target.char] = true;
    saveSeenWords();

    // 5. Préparer les options
    const options = [target];
    while(options.length < 4) {
        let r = HSK1[Math.floor(Math.random() * HSK1.length)];
        if(!options.find(o => o.char === r.char)) options.push(r);
    }
    options.sort(() => 0.5 - Math.random());

    quizState.count++;

    // 6. Mise à jour de l'affichage
    document.getElementById('quizChar').innerHTML = `
        <div style="font-size:0.8rem; color:var(--primary); font-family:'Space Mono'; margin-bottom:10px;">
            QUESTION ${quizState.count} / 10
        </div>
        ${target.char}
    `;
    
    document.getElementById('quizOptions').innerHTML = options.map(o => `
        <button class="quiz-opt" onclick="checkAnswer('${o.char}', '${target.char}')">
            ${state.lang === 'fr' ? o.fr : o.en}
        </button>
    `).join('');
    
    speak(target.char);
}

function checkAnswer(chosen, correct) {
    if(chosen === correct) {
        quizState.score++;
        alert("Correct ! ✨");
    } else {
        alert("Faux. Le mot était : " + correct);
    }

    if(quizState.count < 10) {
        nextQuestion();
    } else {
        alert(`Session terminée ! \nScore : ${quizState.score} / 10`);
        renderQuizNav(); // Retour au menu du quiz
    }
}
// 4. PROGRESSION
function renderStats() {
    const masteredCount = Object.values(state.mastered).filter(v => v).length;
    document.getElementById('statMastered').innerText = masteredCount;
    document.getElementById('statStreak').innerText = state.streak;

    const bars = document.getElementById('progressionBars');
    bars.innerHTML = categories.filter(c => c !== "All").map(cat => {
        const words = HSK1.filter(w => w.cat === cat);
        const m = words.filter(w => state.mastered[w.char]).length;
        const pct = Math.round((m / words.length) * 100);
        return `<div style="margin-bottom:15px;">
            <div style="display:flex; justify-content:space-between; font-size:0.6rem; color:var(--text-dim); margin-bottom:5px;">
                <span>${cat}</span><span>${m}/${words.length} (${pct}%)</span>
            </div>
            <div class="lp-bar"><div class="lp-fill" style="width:${pct}%"></div></div>
        </div>`;
    }).join('');
}

function startApp() {
    document.getElementById('unlocker').style.display = 'none';
    // Init categories filter
    const select = document.getElementById('catFilter');
    categories.filter(c => c !== "All").forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.innerText = c;
        select.appendChild(opt);
    });
    updateUI();
}

window.speechSynthesis.onvoiceschanged = () => {
    document.getElementById('audioStatus').innerText = "AUDIO PRÊT (VOLUME MAX)";
    document.getElementById('btnEntrer').style.display = "block";
};
setTimeout(() => { document.getElementById('btnEntrer').style.display = "block"; }, 1500);

</script>
